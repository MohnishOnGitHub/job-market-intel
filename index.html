<!DOCTYPE html>
<html>
<head>
    <title>AI Job Matcher</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #0f172a, #020617);
            color: white;
            padding: 40px;
        }

        .title {
            text-align: center;
            font-size: 40px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            text-align: center;
        }

        input, button {
            margin: 10px;
            padding: 12px;
            border-radius: 8px;
            border: none;
        }

        button {
            background: #22c55e;
            color: white;
            cursor: pointer;
        }

        .job {
            background: #1e293b;
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            text-align: left;
        }

        .skill-tag {
            background: #334155;
            padding: 5px 10px;
            border-radius: 20px;
            margin: 3px;
            display: inline-block;
            font-size: 12px;
        }

        .bar {
            height: 8px;
            background: #0f172a;
            border-radius: 5px;
        }

        .bar-fill {
            height: 100%;
            background: #22c55e;
            border-radius: 5px;
        }

        /* Modal */
        #modal {
            display:none;
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.7);
            justify-content:center;
            align-items:center;
        }

        #modal-content {
            background:#1e293b;
            padding:30px;
            border-radius:12px;
            width:400px;
        }
    </style>
</head>

<body>

<h1 class="title">🚀 AI Job Matcher</h1>

<div class="container">
    <input type="file" id="resume">
    <br>
    <button onclick="uploadResume()">Find Jobs</button>

    <div id="results"></div>

    <!-- 📊 Chart -->
    <canvas id="chart" style="margin-top:40px;"></canvas>
</div>

<!-- 📄 Modal -->
<div id="modal">
    <div id="modal-content"></div>
</div>

<script>

async function uploadResume() {
    const fileInput = document.getElementById("resume");
    const file = fileInput.files[0];

    if (!file) {
        alert("Upload resume first");
        return;
    }

    const formData = new FormData();
    formData.append("file", file);

    const res = await fetch("http://127.0.0.1:8000/upload-resume", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    const resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    data.jobs.forEach(job => {
        const div = document.createElement("div");
        div.className = "job";

        const skillsHTML = job.skills.map(s =>
            `<span class="skill-tag">${s}</span>`
        ).join("");

        const missingHTML = job.missing_skills.length > 0
            ? `<p style="color:#facc15;"><b>Improve:</b> ${job.missing_skills.join(", ")}</p>`
            : "";

        div.innerHTML = `
            <h3>${job.title}</h3>
            <p><b>${job.company}</b> • ${job.location}</p>

            <p><b>Match Score:</b> ${job.match_score}</p>
            <div class="bar">
                <div class="bar-fill" style="width:${job.match_score * 100}%"></div>
            </div>

            <p>TF-IDF: ${job.tfidf_score}</p>
            <p>Skill Score: ${job.skill_score}</p>

            <div>${skillsHTML}</div>

            ${missingHTML}

            <p style="color:#38bdf8;">
                <b>Potential Score:</b> ${job.projected_score}
            </p>

            <button onclick='viewJob(${JSON.stringify(job)})'>View Details</button>
        `;

        resultsDiv.appendChild(div);
    });

    // 📊 CHART
    const labels = data.jobs.map(job => job.title);
    const scores = data.jobs.map(job => job.match_score);

    const ctx = document.getElementById("chart").getContext("2d");

    new Chart(ctx, {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "Match Score",
                data: scores
            }]
        }
    });
}

// 📄 MODAL
function viewJob(job) {
    const modal = document.getElementById("modal");
    const content = document.getElementById("modal-content");

    content.innerHTML = `
        <h2>${job.title}</h2>
        <p><b>Company:</b> ${job.company}</p>
        <p><b>Location:</b> ${job.location}</p>
        <p><b>Match Score:</b> ${job.match_score}</p>
        <p><b>Potential Score:</b> ${job.projected_score}</p>
        <p><b>Skills:</b> ${job.skills.join(", ")}</p>
        <p style="color:#facc15;"><b>Improve:</b> ${job.missing_skills.join(", ")}</p>
        <br>
        <button onclick="closeModal()">Close</button>
    `;

    modal.style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
